<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURAN — Чат с администратором</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-shared.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#06080f;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;}
:root{
  --surf:#0d1424;--surf2:#121c31;
  --b:rgba(59,130,246,.10);--b2:rgba(59,130,246,.18);
  --ac:#3b82f6;--ac2:#60a5fa;--ac3:#93c5fd;
  --t1:#e2e8f0;--t2:#7a99cc;--t3:#3d5480;
}
.header{background:var(--surf);border-bottom:1px solid var(--b);padding:16px 24px;display:flex;align-items:center;gap:16px;}
.back-btn{background:rgba(59,130,246,.1);border:1px solid var(--b2);border-radius:8px;padding:8px 16px;color:var(--ac2);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;text-decoration:none;}
.back-btn:hover{background:rgba(59,130,246,.2);}
.h-title{font-family:'Montserrat',sans-serif;font-size:1.2rem;font-weight:700;color:var(--t1);}
.h-sub{font-size:.75rem;color:var(--t3);margin-left:auto;}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:20px;}
.messages{flex:1;overflow-y:auto;padding:20px;background:var(--surf);border:1px solid var(--b);border-radius:12px;margin-bottom:16px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:70%;padding:12px 16px;border-radius:12px;font-size:.88rem;line-height:1.5;word-wrap:break-word;}
.msg-me{align-self:flex-end;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;}
.msg-other{align-self:flex-start;background:var(--surf2);border:1px solid var(--b);color:var(--t1);}
.msg-time{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:4px;}
.msg-other .msg-time{color:var(--t3);}
.msg-sender{font-size:.72rem;font-weight:600;color:var(--ac2);margin-bottom:4px;}
.input-box{display:flex;gap:10px;}
.input-box input{flex:1;padding:12px 16px;background:var(--surf2);border:1.5px solid var(--b);border-radius:10px;color:var(--t1);font-size:.88rem;outline:none;transition:all .2s;}
.input-box input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(59,130,246,.09);}
.send-btn{padding:12px 24px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(59,130,246,.4);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}
.empty{text-align:center;color:var(--t3);padding:40px;font-size:.9rem;}
</style>
</head>
<body>
<div class="header">
  <a href="dashboard.html" class="back-btn">← Назад</a>
  <div class="h-title">💬 Чат с администратором</div>
  <div class="h-sub" id="status">Подключение...</div>
</div>
<div class="chat-wrap">
  <div class="messages" id="messages">
    <div class="empty">Загрузка сообщений...</div>
  </div>
  <div class="input-box">
    <input id="msg-input" type="text" placeholder="Введите сообщение..." maxlength="500">
    <button class="send-btn" onclick="sendMsg()">Отправить</button>
  </div>
</div>

<script>
let me = null;
let sessionId = null;
let subscription = null;

async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ location.href='login.html'; return; }

  const {data:p} = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  me = p;

  if(me.role !== 'teacher' && me.role !== 'admin'){
    alert('Доступ запрещён. Только преподаватели могут писать администратору.');
    location.href='dashboard.html';
    return;
  }

  document.getElementById('status').textContent = me.role === 'admin' ? 'Администратор' : 'Преподаватель';

  await loadOrCreateSession();
  await loadMessages();
  subscribeToMessages();

  document.getElementById('msg-input').addEventListener('keypress', e => {
    if(e.key === 'Enter') sendMsg();
  });
}

async function loadOrCreateSession(){
  if(me.role === 'teacher'){
    // Преподаватель: ищем или создаём свою активную сессию
    let {data:existing} = await sb
      .from('chat_sessions')
      .select('*')
      .eq('teacher_id', me.id)
      .eq('status', 'active')
      .maybeSingle();

    if(!existing){
      const {data:newSession} = await sb
        .from('chat_sessions')
        .insert({teacher_id: me.id, status: 'active'})
        .select()
        .single();
      existing = newSession;
    }
    sessionId = existing.id;
  } else {
    // Админ: показываем список сессий или выбираем первую активную
    const {data:sessions} = await sb
      .from('chat_sessions')
      .select('*, profiles!chat_sessions_teacher_id_fkey(full_name, username)')
      .eq('status', 'active')
      .order('updated_at', {ascending: false});

    if(!sessions || sessions.length === 0){
      document.getElementById('messages').innerHTML = '<div class="empty">Нет активных чатов</div>';
      return;
    }

    // Берём первую сессию (можно добавить выбор)
    sessionId = sessions[0].id;
  }
}

async function loadMessages(){
  if(!sessionId) return;

  const {data:msgs} = await sb
    .from('chat_messages')
    .select('*, profiles!chat_messages_sender_id_fkey(full_name, username)')
    .eq('session_id', sessionId)
    .order('created_at', {ascending:true});

  renderMessages(msgs || []);

  // Отмечаем как прочитанные
  await sb
    .from('chat_messages')
    .update({is_read: true})
    .eq('session_id', sessionId)
    .neq('sender_id', me.id);
}

function renderMessages(msgs){
  const el = document.getElementById('messages');
  if(!msgs || msgs.length === 0){
    el.innerHTML = '<div class="empty">Нет сообщений. Начните диалог!</div>';
    return;
  }

  el.innerHTML = msgs.map(m => {
    const isMe = m.sender_id === me.id;
    const sender = m.profiles?.full_name || m.profiles?.username || 'Пользователь';
    const time = new Date(m.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    
    return `
      <div class="msg ${isMe ? 'msg-me' : 'msg-other'}">
        ${!isMe ? `<div class="msg-sender">${sender}</div>` : ''}
        <div>${m.message_text}</div>
        <div class="msg-time">${time}</div>
      </div>
    `;
  }).join('');

  el.scrollTop = el.scrollHeight;
}

async function sendMsg(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text || !sessionId) return;

  const {error} = await sb
    .from('chat_messages')
    .insert({
      session_id: sessionId,
      sender_id: me.id,
      message_text: text,
      is_read: false
    });

  if(error){
    alert('Ошибка отправки: ' + error.message);
    return;
  }

  input.value = '';
  await loadMessages();
}

function subscribeToMessages(){
  if(!sessionId) return;

  subscription = sb
    .channel(`chat:${sessionId}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'chat_messages',
      filter: `session_id=eq.${sessionId}`
    }, payload => {
      loadMessages();
    })
    .subscribe();
}

window.addEventListener('beforeunload', () => {
  if(subscription) subscription.unsubscribe();
});

init();
</script>
</body>
</html>
