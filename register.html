<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURAN — Регистрация</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-shared.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#06080f;}
.bg{position:fixed;inset:0;background:url('media/Fon.png') center/cover no-repeat;z-index:0;}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,8,15,.88) 0%,rgba(6,12,30,.82) 100%);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{
  width:100%;max-width:460px;background:rgba(10,16,35,.88);backdrop-filter:blur(24px);
  border:1px solid rgba(59,130,246,.18);border-radius:20px;padding:40px;
  box-shadow:0 24px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);
  animation:up .4s cubic-bezier(.16,1,.3,1);
}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card-head{text-align:center;margin-bottom:28px;}
.card-logo{width:58px;height:58px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 0 18px rgba(59,130,246,.5));}
.card-brand{
  font-family:'Montserrat',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:5px;
  background:linear-gradient(135deg,#fff 0%,#bfdbfe 40%,#60a5fa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px;
}
.card-sub{font-size:.72rem;color:rgba(148,163,184,.6);letter-spacing:2px;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.71rem;font-weight:600;color:rgba(148,163,184,.70);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.input-wrap{position:relative;}
.field input{
  width:100%;padding:12px 16px;background:rgba(15,23,42,.8);
  border:1.5px solid rgba(59,130,246,.15);border-radius:10px;color:#e2e8f0;
  font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:all .2s;
}
.field input:focus{border-color:rgba(59,130,246,.5);background:rgba(15,23,42,.95);box-shadow:0 0 0 3px rgba(59,130,246,.09);}
.field input::placeholder{color:rgba(100,116,139,.5);}
.field input[readonly]{background:rgba(10,20,45,.6);color:rgba(148,163,184,.7);cursor:default;}
.eye,.gen{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(100,116,139,.6);font-size:.95rem;transition:color .2s;padding:4px;line-height:1;}
.eye{right:14px;} .gen{right:40px;font-size:.8rem;}
.eye:hover,.gen:hover{color:#60a5fa;}
.copy-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.2);
  border-radius:6px;padding:4px 10px;cursor:pointer;color:#60a5fa;font-size:.72rem;font-weight:600;transition:all .2s;
}
.copy-btn:hover{background:rgba(59,130,246,.22);}
.pw-bars{display:flex;gap:5px;margin-top:8px;}
.pw-bar{flex:1;height:3px;border-radius:3px;background:rgba(59,130,246,.12);transition:background .3s;}
.pw-bar.weak{background:#ef4444;} .pw-bar.ok{background:#3b82f6;} .pw-bar.good{background:#06b6d4;} .pw-bar.great{background:#22c55e;}
.pw-inds{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.pw-ind{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;background:rgba(15,23,42,.8);color:rgba(100,116,139,.6);border:1px solid rgba(59,130,246,.10);transition:all .25s;}
.pw-ind.ok{background:rgba(59,130,246,.12);color:#93c5fd;border-color:rgba(59,130,246,.25);}
.msg{padding:11px 14px;border-radius:8px;font-size:.83rem;margin-bottom:16px;display:none;border-left:3px solid;line-height:1.6;}
.msg.show{display:block;}
.msg-error{background:rgba(239,68,68,.08);color:#fca5a5;border-color:#ef4444;}
.msg-success{background:rgba(34,197,94,.08);color:#86efac;border-color:#22c55e;}
.msg-info{background:rgba(59,130,246,.08);color:#93c5fd;border-color:#3b82f6;}
.msg-warn{background:rgba(234,179,8,.08);color:#fde047;border-color:#eab308;}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s;}
.btn-primary{background:linear-gradient(135deg,#1d4ed8 0%,#3b82f6 100%);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.28);margin-bottom:10px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,.42);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-ghost{background:rgba(59,130,246,.06);color:rgba(148,163,184,.75);border:1.5px solid rgba(59,130,246,.13);}
.btn-ghost:hover{background:rgba(59,130,246,.12);color:#93c5fd;}
.link-row{text-align:center;margin-top:16px;font-size:.82rem;color:rgba(148,163,184,.6);}
.link-row a{color:#60a5fa;text-decoration:none;}
.link-row a:hover{color:#93c5fd;text-decoration:underline;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:7px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Chat button */
.chat-fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,.4);transition:all .3s;z-index:1000;display:flex;align-items:center;justify-content:center;}
.chat-fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(59,130,246,.6);}
.chat-fab.has-unread::after{content:'';position:absolute;top:8px;right:8px;width:12px;height:12px;background:#ef4444;border-radius:50%;border:2px solid #06080f;}

/* Chat window */
.chat-window{position:fixed;bottom:90px;right:24px;width:360px;max-width:calc(100vw - 48px);height:500px;max-height:calc(100vh - 140px);background:rgba(10,16,35,.97);backdrop-filter:blur(24px);border:1px solid rgba(59,130,246,.25);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.6);display:none;flex-direction:column;z-index:1001;animation:up .3s ease-out;}
.chat-window.open{display:flex;}
.chat-header{padding:16px;border-bottom:1px solid rgba(59,130,246,.15);display:flex;align-items:center;justify-content:space-between;}
.chat-title{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:700;color:#e2e8f0;}
.chat-close{background:none;border:none;color:rgba(148,163,184,.6);font-size:1.2rem;cursor:pointer;padding:4px;line-height:1;transition:color .2s;}
.chat-close:hover{color:#e2e8f0;}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:.85rem;line-height:1.5;word-wrap:break-word;}
.chat-msg.mine{align-self:flex-end;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border-bottom-right-radius:4px;}
.chat-msg.theirs{align-self:flex-start;background:rgba(59,130,246,.12);color:#e2e8f0;border-bottom-left-radius:4px;}
.chat-msg-time{font-size:.7rem;color:rgba(148,163,184,.5);margin-top:4px;}
.chat-footer{padding:12px;border-top:1px solid rgba(59,130,246,.15);display:flex;gap:8px;}
.chat-input{flex:1;padding:10px 12px;background:rgba(15,23,42,.8);border:1.5px solid rgba(59,130,246,.15);border-radius:8px;color:#e2e8f0;font-size:.85rem;font-family:'Inter',sans-serif;outline:none;resize:none;max-height:80px;}
.chat-input:focus{border-color:rgba(59,130,246,.5);}
.chat-send{padding:10px 16px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;}
.chat-send:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.4);}
.chat-send:disabled{opacity:.5;cursor:not-allowed;}

/* Chat intro */
.chat-intro{text-align:center;padding:20px;color:rgba(148,163,184,.7);font-size:.82rem;}
.chat-intro-icon{font-size:2.5rem;margin-bottom:12px;}
.chat-intro-title{font-weight:600;color:#e2e8f0;margin-bottom:8px;}
.chat-name-form{margin-top:16px;}
.chat-name-form input{width:100%;padding:10px 12px;background:rgba(15,23,42,.8);border:1.5px solid rgba(59,130,246,.15);border-radius:8px;color:#e2e8f0;font-size:.85rem;margin-bottom:8px;outline:none;}
.chat-name-form input:focus{border-color:rgba(59,130,246,.5);}
.chat-name-form button{width:100%;padding:10px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <div class="card">
    <div class="card-head">
      <img src="media/logo.png" alt="TURAN" class="card-logo" onerror="this.style.display='none'">
      <div class="card-brand">TURAN</div>
      <div class="card-sub">Регистрация</div>
    </div>
    <div id="msg" class="msg"></div>
    <div class="field">
      <label>ФИО (полностью)</label>
      <input id="fullname" type="text" placeholder="Иванов Иван Иванович" oninput="onFio()">
    </div>
    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="ivanov@example.com" required>
    </div>
    <div class="field">
      <label>Логин (генерируется автоматически)</label>
      <div class="input-wrap">
        <input id="username" type="text" readonly placeholder="ivanov_ii" style="padding-right:95px">
        <button class="copy-btn" onclick="copyVal('username')">Копировать</button>
      </div>
    </div>
    <div class="field">
      <label>Отдел / Должность</label>
      <input id="dept" type="text" placeholder="Кафедра информатики">
    </div>
    <div class="field">
      <label>Роль</label>
      <select id="role" style="width:100%;padding:12px 16px;background:rgba(15,23,42,.8);border:1.5px solid rgba(59,130,246,.15);border-radius:10px;color:#e2e8f0;font-size:.9rem;font-family:'Inter',sans-serif;outline:none;cursor:pointer;">
        <option value="student">Студент</option>
        <option value="teacher">Преподаватель</option>
      </select>
    </div>
    <div class="field">
      <label>Пароль</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="••••••••" oninput="checkStrength()" style="padding-right:72px">
        <button class="gen" type="button" onclick="genPw()" title="Сгенерировать пароль">⚡</button>
        <button class="eye" type="button" onclick="toggleEye('password',this)">👁</button>
      </div>
      <div class="pw-bars"><div class="pw-bar" id="b1"></div><div class="pw-bar" id="b2"></div><div class="pw-bar" id="b3"></div><div class="pw-bar" id="b4"></div></div>
      <div class="pw-inds">
        <span class="pw-ind" id="pi-len">8+ символов</span>
        <span class="pw-ind" id="pi-up">A-Z</span>
        <span class="pw-ind" id="pi-low">a-z</span>
        <span class="pw-ind" id="pi-num">0-9</span>
        <span class="pw-ind" id="pi-sym">!@#</span>
      </div>
    </div>
    <div class="field">
      <label>Подтвердить пароль</label>
      <div class="input-wrap">
        <input id="confirm" type="password" placeholder="••••••••" style="padding-right:46px">
        <button class="eye" type="button" onclick="toggleEye('confirm',this)">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">Зарегистрироваться</button>
    <button class="btn btn-ghost" onclick="location.href='index.html'">← На главную</button>
    <div class="link-row">Уже есть аккаунт? <a href="login.html">Войти</a></div>
  </div>
</div>

<!-- Chat FAB -->
<button class="chat-fab" onclick="toggleChat()" id="chat-fab">💬</button>

<!-- Chat Window -->
<div class="chat-window" id="chat-window">
  <div class="chat-header">
    <div class="chat-title">💬 Чат с администратором</div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-body" id="chat-body">
    <div class="chat-intro" id="chat-intro">
      <div class="chat-intro-icon">👋</div>
      <div class="chat-intro-title">Нужна помощь?</div>
      <div>Представьтесь, чтобы начать чат с администратором</div>
      <div class="chat-name-form">
        <input type="text" id="guest-name" placeholder="Ваше имя" maxlength="50">
        <input type="email" id="guest-email" placeholder="Email (необязательно)" maxlength="100">
        <button onclick="startAnonymousChat()">Начать чат</button>
      </div>
    </div>
  </div>
  <div class="chat-footer" id="chat-footer" style="display:none">
    <textarea class="chat-input" id="chat-input" placeholder="Введите сообщение..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAnonymousMessage();}"></textarea>
    <button class="chat-send" onclick="sendAnonymousMessage()">➤</button>
  </div>
</div>

<script>
// Транслитерация
const MAP={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'kh',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',ә:'a',ғ:'g',қ:'k',ң:'n',ө:'o',ұ:'u',ү:'u',һ:'h',і:'i'};
function tr(s){return[...s.toLowerCase()].map(c=>MAP[c]!==undefined?MAP[c]:c).join('');}
function genUsername(fio){
  const p=fio.trim().split(/\s+/);
  if(p.length<2) return '';
  return (tr(p[0])+(tr(p[1])[0]||'')+(tr(p[2]||'')[0]||'')).replace(/[^a-z0-9_]/g,'');
}
function onFio(){document.getElementById('username').value=genUsername(document.getElementById('fullname').value);}

function rc(s){const a=new Uint32Array(1);crypto.getRandomValues(a);return s[a[0]%s.length];}
function shuffle(s){const a=[...s];for(let i=a.length-1;i>0;i--){const r=new Uint32Array(1);crypto.getRandomValues(r);const j=r[0]%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a.join('');}
function genPw(){
  const U='ABCDEFGHIJKLMNOPQRSTUVWXYZ',L='abcdefghijklmnopqrstuvwxyz',N='0123456789',S='!@#$%^&*';
  let pw=rc(U)+rc(L)+rc(N)+rc(S);
  for(let i=4;i<14;i++) pw+=rc(U+L+N+S);
  pw=shuffle(pw);
  document.getElementById('password').value=pw;
  document.getElementById('confirm').value=pw;
  document.getElementById('password').type='text';
  checkStrength();
}

function checkStrength(){
  const pw=document.getElementById('password').value;
  const r={len:pw.length>=8,up:/[A-Z]/.test(pw),low:/[a-z]/.test(pw),num:/[0-9]/.test(pw),sym:/[!@#$%^&*]/.test(pw)};
  const score=Object.values(r).filter(Boolean).length;
  const cls=['','weak','ok','good','great','great'][score]||'great';
  ['b1','b2','b3','b4'].forEach((id,i)=>document.getElementById(id).className='pw-bar'+(i<score?' '+cls:''));
  ['pi-len','pi-up','pi-low','pi-num','pi-sym'].forEach((id,i)=>document.getElementById(id).className='pw-ind'+(Object.values(r)[i]?' ok':''));
}

function toggleEye(id,btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁':'🙈';
}
function copyVal(id){
  const v=document.getElementById(id).value;
  if(!v){showMsg('Сначала введите ФИО для генерации логина','error');return;}
  navigator.clipboard.writeText(v).then(()=>{
    showMsg('Логин скопирован: '+v,'info');
    setTimeout(()=>document.getElementById('msg').classList.remove('show'),3000);
  });
}
function showMsg(txt,type){
  const el=document.getElementById('msg');
  el.innerHTML=txt;
  el.className='msg msg-'+type+' show';
}
function setLoading(on){
  const btn=document.getElementById('reg-btn');
  btn.disabled=on;
  btn.innerHTML=on?'<span class="spin"></span>Регистрация...':'Зарегистрироваться';
}

async function doRegister(){
  const fullname=document.getElementById('fullname').value.trim();
  const email=document.getElementById('email').value.trim();
  const username=document.getElementById('username').value.trim();
  const dept=document.getElementById('dept').value.trim();
  const role=document.getElementById('role').value;
  const pw=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;

  if(!fullname||!username){showMsg('Введите ФИО для генерации логина','error');return;}
  if(!email){showMsg('Введите email','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('Введите корректный email','error');return;}
  if(!pw){showMsg('Введите пароль','error');return;}
  if(pw!==confirm){showMsg('Пароли не совпадают','error');return;}
  if(pw.length<8){showMsg('Пароль должен быть минимум 8 символов','error');return;}

  setLoading(true);

  let data, error;
  try {
    const result = await sb.auth.signUp({
      email: email,
      password: pw,
      options: {
        data: {
          full_name: fullname,
          username: username,
          role: role,
          department: dept
        }
      }
    });
    data = result.data;
    error = result.error;
  } catch(e) {
    setLoading(false);
    showMsg('❌ Ошибка сети: ' + e.message, 'error');
    return;
  }

  setLoading(false);

  if(error){
    let m = error.message || 'Неизвестная ошибка';
    console.error('[register] Supabase error:', error);

    if(m.includes('already registered') || m.includes('User already') || m.includes('already been registered')){
      m = 'Этот логин уже занят. Попробуйте другое имя.';
    } else if(m.includes('rate limit') || m.includes('email rate') || m.includes('over_email_send_rate_limit')){
      m = '⚠️ Превышен лимит email-подтверждений.<br><br>' +
          '<b>Что сделать:</b><br>' +
          '1. Открой <b>Supabase Dashboard</b><br>' +
          '2. Перейди в <b>Authentication → Providers → Email</b><br>' +
          '3. Выключи <b>"Confirm email"</b> (Toggle → OFF)<br>' +
          '4. Нажми <b>Save</b> и попробуй снова.';
      showMsg(m, 'warn');
      return;
    } else if(m.includes('Password should') || m.includes('weak password')){
      m = 'Пароль слишком простой. Добавь заглавные буквы, цифры и символы (!@#).';
    } else if(m.includes('Unable to validate') || m.includes('invalid')){
      m = 'Ошибка валидации. Проверьте корректность данных.';
    }
    showMsg('❌ ' + m, 'error');
    return;
  }

  // --- Анализируем ответ Supabase ---

  // Случай 1: сессия есть → "Confirm email" выключен → пользователь сразу залогинен
  if(data?.session){
    await sb.from('audit_logs').insert({
      user_id: data.user.id,
      username,
      event_type: 'register',
      description: 'Регистрация нового пользователя',
      status: 'success'
    }).catch(()=>{});

    showMsg('✅ Регистрация успешна! Переходим...', 'success');
    setTimeout(()=>location.href='dashboard.html', 1200);
    return;
  }

  // Случай 2: user есть, сессии нет — "Confirm email" включён ИЛИ пользователь уже существует
  // Supabase не раскрывает разницу между "уже зарегистрирован" и "ждёт подтверждения"
  // по соображениям безопасности (anti-enumeration). Мы это учитываем.
  if(data?.user){
    const identities = data.user.identities || [];

    if(identities.length === 0){
      // Пользователь с таким email уже зарегистрирован
      showMsg('Этот логин уже занят. Выберите другое имя.', 'error');
      return;
    }

    // Новый пользователь, ждёт подтверждения email
    showMsg(
      '📧 Аккаунт создан, но требует подтверждения email.<br><br>' +
      '<b>Чтобы войти без подтверждения:</b><br>' +
      '→ Supabase → Authentication → Providers → Email<br>' +
      '→ Выключи <b>"Confirm email"</b> → Save<br><br>' +
      'Либо подтверди email и затем войди.',
      'warn'
    );
    return;
  }

  // Случай 3: ни user, ни error — непредвиденный ответ
  showMsg('Неожиданный ответ от сервера. Попробуйте ещё раз.', 'error');
}

document.getElementById('fullname').focus();

// ═══════ ANONYMOUS CHAT ═══════
let anonChatSession = null;
let anonChatMessages = [];
let anonChatSubscription = null;

function toggleChat() {
  const window = document.getElementById('chat-window');
  const isOpen = window.classList.contains('open');
  
  if (isOpen) {
    window.classList.remove('open');
  } else {
    window.classList.add('open');
    if (anonChatSession) {
      loadAnonymousMessages();
    }
  }
}

async function startAnonymousChat() {
  const name = document.getElementById('guest-name').value.trim();
  const email = document.getElementById('guest-email').value.trim();
  
  if (!name) {
    alert('Введите ваше имя');
    return;
  }
  
  const { data, error } = await sb
    .from('anonymous_chat_sessions')
    .insert({
      guest_name: name,
      guest_email: email || null,
      status: 'active'
    })
    .select()
    .single();
  
  if (error) {
    console.error('Error creating anonymous chat:', error);
    alert('Ошибка создания чата. Попробуйте ещё раз.');
    return;
  }
  
  anonChatSession = data;
  localStorage.setItem('anonChatSession', JSON.stringify(data));
  
  document.getElementById('chat-intro').style.display = 'none';
  document.getElementById('chat-footer').style.display = 'flex';
  
  subscribeToAnonymousChat();
  
  await sb.from('anonymous_chat_messages').insert({
    session_id: anonChatSession.id,
    sender_type: 'guest',
    sender_name: name,
    message_text: `Здравствуйте! Меня зовут ${name}. Мне нужна помощь с регистрацией.`,
    is_read: false
  });
  
  document.getElementById('chat-input').focus();
}

async function loadAnonymousMessages() {
  if (!anonChatSession) return;
  
  const { data, error } = await sb
    .from('anonymous_chat_messages')
    .select('*')
    .eq('session_id', anonChatSession.id)
    .order('created_at', { ascending: true });
  
  if (error) {
    console.error('Error loading messages:', error);
    return;
  }
  
  anonChatMessages = data || [];
  renderAnonymousMessages();
}

function renderAnonymousMessages() {
  const body = document.getElementById('chat-body');
  
  if (anonChatMessages.length === 0) {
    body.innerHTML = '<div class="chat-intro"><div class="chat-intro-icon">💬</div><div>Напишите сообщение администратору</div></div>';
    return;
  }
  
  const html = anonChatMessages.map(msg => {
    const isMine = msg.sender_type === 'guest';
    const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    
    return `
      <div class="chat-msg ${isMine ? 'mine' : 'theirs'}">
        ${!isMine ? `<div style="font-size:.7rem;color:rgba(148,163,184,.7);margin-bottom:4px">${msg.sender_name}</div>` : ''}
        <div>${escapeHtml(msg.message_text)}</div>
        <div class="chat-msg-time">${time}</div>
      </div>
    `;
  }).join('');
  
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function sendAnonymousMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  
  if (!text || !anonChatSession) return;
  
  const { error } = await sb
    .from('anonymous_chat_messages')
    .insert({
      session_id: anonChatSession.id,
      sender_type: 'guest',
      sender_name: anonChatSession.guest_name,
      message_text: text,
      is_read: false
    });
  
  if (error) {
    console.error('Error sending message:', error);
    alert('Ошибка отправки сообщения');
    return;
  }
  
  input.value = '';
  input.style.height = 'auto';
}

function subscribeToAnonymousChat() {
  if (anonChatSubscription) {
    anonChatSubscription.unsubscribe();
  }
  
  anonChatSubscription = sb
    .channel(`anon-chat:${anonChatSession.id}`)
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'anonymous_chat_messages',
      filter: `session_id=eq.${anonChatSession.id}`
    }, payload => {
      anonChatMessages.push(payload.new);
      renderAnonymousMessages();
      
      if (!document.getElementById('chat-window').classList.contains('open')) {
        document.getElementById('chat-fab').classList.add('has-unread');
      }
    })
    .subscribe();
}

(async () => {
  const saved = localStorage.getItem('anonChatSession');
  if (saved) {
    try {
      anonChatSession = JSON.parse(saved);
      
      const { data } = await sb
        .from('anonymous_chat_sessions')
        .select('*')
        .eq('id', anonChatSession.id)
        .eq('status', 'active')
        .single();
      
      if (data) {
        anonChatSession = data;
        document.getElementById('chat-intro').style.display = 'none';
        document.getElementById('chat-footer').style.display = 'flex';
        await loadAnonymousMessages();
        subscribeToAnonymousChat();
      } else {
        localStorage.removeItem('anonChatSession');
        anonChatSession = null;
      }
    } catch (e) {
      localStorage.removeItem('anonChatSession');
    }
  }
})();

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('chat-input');
  if (input) {
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });
  }
});
</script>
</body>
</html>
