<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURAN — Новый пароль</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-shared.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#06080f;}
.bg{position:fixed;inset:0;background:url('media/Fon.png') center/cover no-repeat;z-index:0;}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,8,15,.88) 0%,rgba(6,12,30,.82) 100%);}
.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{
  width:100%;max-width:460px;background:rgba(10,16,35,.88);backdrop-filter:blur(24px);
  border:1px solid rgba(59,130,246,.18);border-radius:20px;padding:40px;
  box-shadow:0 24px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.04);
  animation:up .4s cubic-bezier(.16,1,.3,1);
}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card-head{text-align:center;margin-bottom:28px;}
.card-logo{width:58px;height:58px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 0 18px rgba(59,130,246,.5));}
.card-brand{
  font-family:'Montserrat',sans-serif;font-size:1.8rem;font-weight:900;letter-spacing:5px;
  background:linear-gradient(135deg,#fff 0%,#bfdbfe 40%,#60a5fa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px;
}
.card-sub{font-size:.72rem;color:rgba(148,163,184,.6);letter-spacing:2px;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.71rem;font-weight:600;color:rgba(148,163,184,.70);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.input-wrap{position:relative;}
.field input{
  width:100%;padding:12px 16px;background:rgba(15,23,42,.8);
  border:1.5px solid rgba(59,130,246,.15);border-radius:10px;color:#e2e8f0;
  font-size:.9rem;font-family:'Inter',sans-serif;outline:none;transition:all .2s;
}
.field input:focus{border-color:rgba(59,130,246,.5);background:rgba(15,23,42,.95);box-shadow:0 0 0 3px rgba(59,130,246,.09);}
.field input::placeholder{color:rgba(100,116,139,.5);}
.eye{position:absolute;top:50%;right:14px;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(100,116,139,.6);font-size:.95rem;transition:color .2s;padding:4px;line-height:1;}
.eye:hover{color:#60a5fa;}
.msg{padding:11px 14px;border-radius:8px;font-size:.83rem;margin-bottom:16px;display:none;border-left:3px solid;line-height:1.6;}
.msg.show{display:block;}
.msg-error{background:rgba(239,68,68,.08);color:#fca5a5;border-color:#ef4444;}
.msg-success{background:rgba(34,197,94,.08);color:#86efac;border-color:#22c55e;}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s;}
.btn-primary{background:linear-gradient(135deg,#1d4ed8 0%,#3b82f6 100%);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.28);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(59,130,246,.42);}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:7px;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <div class="card">
    <div class="card-head">
      <img src="media/logo.png" alt="TURAN" class="card-logo" onerror="this.style.display='none'">
      <div class="card-brand">TURAN</div>
      <div class="card-sub">Установка нового пароля</div>
    </div>
    
    <div id="msg" class="msg"></div>
    
    <div class="field">
      <label>Новый пароль</label>
      <div class="input-wrap">
        <input id="password" type="password" placeholder="••••••••" style="padding-right:46px">
        <button class="eye" type="button" onclick="toggleEye('password',this)">👁</button>
      </div>
    </div>
    
    <div class="field">
      <label>Подтвердите пароль</label>
      <div class="input-wrap">
        <input id="confirm" type="password" placeholder="••••••••" style="padding-right:46px">
        <button class="eye" type="button" onclick="toggleEye('confirm',this)">👁</button>
      </div>
    </div>
    
    <button class="btn btn-primary" id="reset-btn" onclick="updatePassword()">Сохранить пароль</button>
  </div>
</div>

<script>
function showMsg(txt, type) {
  const el = document.getElementById('msg');
  el.innerHTML = txt;
  el.className = 'msg msg-' + type + ' show';
}

function setLoading(on) {
  const btn = document.getElementById('reset-btn');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spin"></span>Сохранение...' : 'Сохранить пароль';
}

function toggleEye(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

async function updatePassword() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  
  if (!password) {
    showMsg('Введите новый пароль', 'error');
    return;
  }
  
  if (password.length < 8) {
    showMsg('Пароль должен быть минимум 8 символов', 'error');
    return;
  }
  
  if (password !== confirm) {
    showMsg('Пароли не совпадают', 'error');
    return;
  }
  
  setLoading(true);
  
  const { error } = await sb.auth.updateUser({
    password: password
  });
  
  setLoading(false);
  
  if (error) {
    console.error('Update error:', error);
    showMsg('❌ Ошибка: ' + error.message, 'error');
    return;
  }
  
  showMsg('✅ Пароль успешно изменён!<br>Перенаправление на страницу входа...', 'success');
  
  setTimeout(() => {
    location.href = 'login.html';
  }, 2000);
}

// Проверяем что пользователь пришёл по ссылке восстановления
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  
  if (!session) {
    showMsg('❌ Ссылка недействительна или истекла.<br>Запросите новую ссылку для восстановления пароля.', 'error');
    document.getElementById('reset-btn').disabled = true;
    setTimeout(() => {
      location.href = 'forgot-password.html';
    }, 3000);
  }
}

checkSession();
document.getElementById('password').focus();
</script>
</body>
</html>
